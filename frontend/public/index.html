<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover" />

    <!-- Primary SEO -->
    <title>Aura Attend — Smart Attendance Management System</title>
    <meta name="description" content="Aura Attend is a smart, biometric-verified attendance management system with GPS tracking, leave management, OD requests, and real-time analytics." />
    <meta name="keywords" content="attendance management, biometric attendance, GPS attendance, leave management, OD request, student attendance system" />
    <meta name="author" content="Aura Attend" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph (Facebook / WhatsApp share) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Aura Attend — Smart Attendance Management" />
    <meta property="og:description" content="Biometric-verified, GPS-tracked attendance management for students and staff." />
    <meta property="og:url" content="https://aura-attend.vercel.app" />
    <meta property="og:image" content="https://aura-attend.vercel.app/og-image.png" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Aura Attend — Smart Attendance" />
    <meta name="twitter:description" content="Biometric-verified attendance management with GPS tracking and analytics." />

    <!-- Mobile / PWA -->
    <meta name="theme-color" content="#0f2027" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Aura Attend" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- Favicon -->
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />

    <!-- Google Fonts — Inter (clean, modern, mobile-friendly) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  </head>
  <body>
    <noscript>You need to enable JavaScript to run Aura Attend.</noscript>
    <div id="root"></div>
  </body>
</html>
